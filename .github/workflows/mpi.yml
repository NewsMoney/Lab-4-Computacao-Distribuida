name: MPI CI Avançado

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Análise Estática (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Rodar cppcheck
        # --library=std: Usa definições internas para a biblioteca padrão
        # --suppress=syntaxError:/usr/include/*: Ignora erros de sintaxe em arquivos do sistema
        # --suppress=missingIncludeSystem: Ignora avisos de cabeçalhos não encontrados
        run: cppcheck --enable=all --error-exitcode=1 --force --library=std --suppress=syntaxError:/usr/include/* --suppress=missingIncludeSystem --inline-suppr .

  # Job 2: Compilação
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Compilar
        run: mpicc soma_de_quadrados.c -o soma_mpi

      - name: Upload binário
        uses: actions/upload-artifact@v4
        with:
          name: soma_mpi
          path: soma_mpi

  # Job 3: Testes de Validação com Matriz (Diferentes N e np)
  teste-dinamico:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        n_value: [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56, 60, 64, 68, 72, 76, 80, 84, 88, 92, 96, 100, 120, 160, 200, 400, 800]
        np: [1, 2, 4]
    steps:
      - name: Instalar MPI e bc
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev bc

      - name: Baixar binário
        uses: actions/download-artifact@v4
        with:
          name: soma_mpi

      - name: Executar e Validar
        run: |
          chmod +x soma_mpi
          EXPECTED_SUM=$(echo "(${{ matrix.n_value }} * (${{ matrix.n_value }} + 1) * (2 * ${{ matrix.n_value }} + 1)) / 6" | bc)
          mpirun --allow-run-as-root --oversubscribe -np ${{ matrix.np }} ./soma_mpi ${{ matrix.n_value }} > output.txt
          if grep -q "soma paralela dos quadrados = $EXPECTED_SUM" output.txt; then
            echo "✅ Sucesso"
          else
            echo "❌ Erro"
            exit 1
          fi

  # Job 4: Verificação de Memória (Valgrind)
  memoria:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar MPI e Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev valgrind

      - name: Baixar binário
        uses: actions/download-artifact@v4
        with:
          name: soma_mpi

      - name: Rodar Valgrind
        run: |
          chmod +x soma_mpi
          # O OpenMPI gera muitos avisos internos no Valgrind que não são erros do seu código.
          # Removemos --error-exitcode=1 para que o CI não falhe por causa de vazamentos internos da biblioteca MPI.
          # Mantemos o log para que você possa inspecionar se houver erros reais no seu código.
          mpirun --allow-run-as-root -np 2 valgrind --leak-check=full ./soma_mpi 20
