name: MPI CI Avançado (Corrigido)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Análise Estática (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Verificar arquivos presentes
        run: ls -R

      - name: Rodar cppcheck
        # Adicionamos --force para garantir que ele processe o arquivo mesmo com macros complexas
        # E especificamos o caminho relativo explicitamente
        run: cppcheck --enable=all --error-exitcode=1 --force ./soma_quadrados_MPI.c

  # Job 2: Compilação
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Compilar
        run: mpicc soma_quadrados_MPI.c -o soma_mpi

      - name: Upload binário
        uses: actions/upload-artifact@v4
        with:
          name: soma_mpi
          path: soma_mpi

  # Job 3: Testes de Validação com Matriz (Diferentes N e np)
  teste-dinamico:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false # Permite que outros testes continuem se um falhar
      matrix:
        # Testando 30 valores diferentes para N
        n_value: [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56, 60, 64, 68, 72, 76, 80, 84, 88, 92, 96, 100, 120, 160, 200, 400, 800]
        np: [1, 2, 4]
    steps:
      - name: Instalar MPI e bc
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev bc

      - name: Baixar binário
        uses: actions/download-artifact@v4
        with:
          name: soma_mpi

      - name: Executar com N=${{ matrix.n_value }} e np=${{ matrix.np }}
        run: |
          chmod +x soma_mpi
          # Usamos mpirun com --oversubscribe para permitir rodar mais processos que cores se necessário
          mpirun --allow-run-as-root --oversubscribe -np ${{ matrix.np }} ./soma_mpi ${{ matrix.n_value }} | tee output.txt

      - name: Validar resultado
        run: |
          # Fórmula da soma dos quadrados: n(n+1)(2n+1)/6
          EXPECTED_SUM=$(echo "(${{ matrix.n_value }} * (${{ matrix.n_value }} + 1) * (2 * ${{ matrix.n_value }} + 1)) / 6" | bc)
          echo "Soma esperada para N=${{ matrix.n_value }}: $EXPECTED_SUM"
          
          if grep -q "soma paralela dos quadrados = $EXPECTED_SUM" output.txt; then
            echo "✅ Sucesso: N=${{ matrix.n_value }}, np=${{ matrix.np }}"
          else
            echo "❌ Erro: Resultado incorreto para N=${{ matrix.n_value }}, np=${{ matrix.np }}"
            cat output.txt
            exit 1
          fi

  # Job 4: Verificação de Memória (Valgrind)
  memoria:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Instalar MPI e Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y openmpi-bin libopenmpi-dev valgrind

      - name: Baixar binário
        uses: actions/download-artifact@v4
        with:
          name: soma_mpi

      - name: Rodar Valgrind
        run: |
          chmod +x soma_mpi
          mpirun --allow-run-as-root -np 2 valgrind --leak-check=full --error-exitcode=1 ./soma_mpi 20
